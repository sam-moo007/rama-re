services:
  postgres:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: rama
      POSTGRES_USER: rama
      POSTGRES_PASSWORD: rama_local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rama -d rama"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - rama_postgres:/var/lib/postgresql/data
      - ./infra/database/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - rama_redis:/data

volumes:
  rama_postgres:
  rama_redis:
