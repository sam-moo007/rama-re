[config]
# Automatically trigger a review on every push to the PR
handle_push_trigger = true

[pr_reviewer]
# Extra instructions to steer Qodo's multi-agent review according to RAMA's enterprise standards
extra_instructions = """
You are reviewing code for RAMA, an enterprise-grade Dubai Real Estate application.
Please strictly enforce the following repository standards:

1. **Bilingual Support (i18n):** Ensure all new user-facing text is localized using the internal i18n system (English and Arabic). No hardcoded strings in UI components.
2. **UI Consistency (shadcn/ui):** Ensure all UI components utilize our standardized `shadcn/ui` components (e.g., `<Button>`, `<Card>`, `<Input>`). Flag any raw HTML elements (like `div`, `button`, `a`) that use custom CSS classes to mimic these components.
3. **Accessibility & Touch Targets:** All interactive elements (buttons, inputs) must maintain a minimum touch target of 44px (e.g., using `h-11` or equivalent padding).
4. **Design System & Tokens:** Verify that styling adheres to `DESIGN.md` tokens (e.g., `bg-surface`, `text-ink`, `border-border`, `rounded-md`, `--shadow-subtle`). Flag unauthorized custom colors or radii.
5. **Code Quality:** Enforce strict TypeScript typings. Flag the use of `any` or bypassed type checks.
"""

[pr_description]
# Steer the automatic PR summaries
extra_instructions = "Format the PR summary clearly, explicitly calling out any changes to the core UI components, translations, or API contracts."

[pr_code_suggestions]
# Steer the commitable code suggestions
extra_instructions = "When suggesting fixes, prioritize migrating legacy CSS utility classes to our standardized shadcn/ui components, and ensure translation keys are used instead of raw text."
