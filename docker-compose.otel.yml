# Local OpenTelemetry stack — Jaeger all-in-one
# Usage: docker compose -f docker-compose.otel.yml up -d
# Traces UI: http://localhost:16686
# OTLP HTTP receiver: http://localhost:4318 (set OTEL_EXPORTER_OTLP_ENDPOINT)

services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: rama-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP  ← set OTEL_EXPORTER_OTLP_ENDPOINT to this
      - "14250:14250"   # Jaeger model.proto
    networks:
      - rama-otel

networks:
  rama-otel:
    driver: bridge
